{% extends "base.html" %}
{% block title %}Create Cohort | Elevo{% endblock %}

{% block content %}
<section class="min-h-screen py-12 px-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-4 mb-10">
            <a href="{% url 'assessments:manage_cohorts' %}" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:bg-white/10 hover:text-white transition-all">
                <i class="ri-arrow-left-line text-xl"></i>
            </a>
            <div>
                <h1 class="text-3xl font-black text-slate-100 italic uppercase">Create Cohort</h1>
                <p class="text-slate-400 text-sm font-medium">Define a new group of students.</p>
            </div>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div class="rounded-[2.5rem] border border-white/10 bg-slate-900/60 p-10 backdrop-blur-xl">
                <div class="space-y-8">
                    <div>
                        <label for="name" class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.2em] mb-3">Cohort Name</label>
                        <input type="text" id="name" name="name" required placeholder="e.g. Computer Science B Tech 2026"
                               class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500/50 transition-all">
                    </div>

                    <div>
                        <label for="description" class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.2em] mb-3">Description (Optional)</label>
                        <textarea id="description" name="description" rows="4" placeholder="Briefly describe who is in this cohort..."
                                  class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-slate-100 placeholder:text-slate-600 focus:outline-none focus:ring-2 focus:ring-sky-500/30 focus:border-sky-500/50 transition-all"></textarea>
                    </div>
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="px-10 py-5 rounded-3xl bg-sky-500 text-white font-black text-sm uppercase tracking-widest hover:bg-sky-400 transition-all shadow-2xl shadow-sky-500/20 active:scale-[0.98]">
                    Create Cohort
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
