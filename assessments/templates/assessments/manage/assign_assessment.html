{% extends "base.html" %}
{% block title %}Assign Assessment | Elevo{% endblock %}

{% block content %}
<section class="min-h-screen py-12 px-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-4 mb-10">
            <a href="{% url 'assessments:manage_assessments' %}" class="w-12 h-12 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:bg-white/10 hover:text-white transition-all">
                <i class="ri-arrow-left-line text-xl"></i>
            </a>
            <div>
                <h1 class="text-3xl font-black text-slate-100 italic uppercase">Assign Test</h1>
                <p class="text-slate-400 text-sm font-medium italic">Assigning "{{ assessment.title }}" to a student group.</p>
            </div>
        </div>

        <form method="POST" class="space-y-8">
            {% csrf_token %}
            <div class="rounded-[2.5rem] border border-white/10 bg-slate-900/60 p-10 backdrop-blur-xl">
                <div class="space-y-10">
                    <!-- Cohort Selection -->
                    <div>
                        <label for="cohort_id" class="block text-[11px] font-black text-sky-400 uppercase tracking-[0.2em] mb-4 text-center">Select Target Cohort</label>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {% for cohort in cohorts %}
                            <label class="relative group cursor-pointer">
                                <input type="radio" name="cohort_id" value="{{ cohort.id }}" required class="peer sr-only">
                                <div class="p-6 rounded-[2rem] border border-white/10 bg-white/5 text-center transition-all peer-checked:border-sky-500/50 peer-checked:bg-sky-500/10 hover:bg-white/10">
                                    <div class="w-10 h-10 rounded-xl bg-slate-800 flex items-center justify-center mx-auto mb-3 shadow-inner">
                                        <i class="ri-group-line text-slate-400 group-hover:text-sky-400 transition-colors"></i>
                                    </div>
                                    <p class="text-slate-100 text-sm font-bold">{{ cohort.name }}</p>
                                    <p class="text-[10px] uppercase font-black text-slate-500 tracking-widest mt-1">{{ cohort.members.count }} Members</p>
                                </div>
                            </label>
                            {% empty %}
                            <div class="col-span-2 p-10 text-center border border-dashed border-white/10 rounded-[2rem]">
                                <p class="text-slate-500 text-sm">No cohorts found. <a href="{% url 'assessments:create_cohort' %}" class="text-sky-400 underline italic">Create one first.</a></p>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <!-- Time Window -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-6 border-t border-white/5">
                        <div>
                            <label for="start_window" class="block text-[11px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Availability Starts</label>
                            <input type="datetime-local" id="start_window" name="start_window" required
                                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                        </div>
                        <div>
                            <label for="end_window" class="block text-[11px] font-black text-slate-500 uppercase tracking-[0.2em] mb-3">Availability Ends</label>
                            <input type="datetime-local" id="end_window" name="end_window" required
                                   class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 text-slate-100 focus:outline-none focus:ring-2 focus:ring-sky-500/30">
                        </div>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit" class="px-12 py-5 rounded-3xl bg-sky-500 text-white font-black text-sm uppercase tracking-widest hover:bg-sky-400 transition-all shadow-2xl shadow-sky-500/20 active:scale-[0.98]">
                    Send to Cohort
                </button>
            </div>
        </form>
    </div>
</section>
{% endblock %}
